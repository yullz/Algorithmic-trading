# ---------------------------------------------------------------------------
# AlgoTrader configuration. Everything here is safe defaults for PAPER trading.
# ---------------------------------------------------------------------------

exchange:
  id: bybit                # ccxt id; USDT-margined perpetual futures
  market_type: swap        # perpetual futures
  # Rate limiting is enabled in code (ccxt enableRateLimit=True).
  # Fallbacks if bybit is unreachable: binanceusdm, okx (set via EXCHANGE env).

universe:
  # "top_volume": scan the top `size` USDT-perps by 24h quote volume
  # (stablecoin/fiat pairs excluded, refreshed hourly).
  # "static": scan only the symbols listed below.
  mode: top_volume
  size: 150
  symbols:                 # used when mode: static (and always scanned first)
    - BTC/USDT:USDT
    - ETH/USDT:USDT
    - SOL/USDT:USDT
  timeframes:
    - 15m
    - 1h
    - 4h
  # Higher timeframe used only for trend context / confluence.
  context_timeframe: 4h
  lookback_candles: 500

risk:
  account_equity: 1000.0
  risk_per_trade_pct: 0.01      # risk 1% of equity to stop
  max_leverage: 5.0
  default_leverage: 3.0
  maker_fee: 0.0002
  taker_fee: 0.0005
  slippage_pct: 0.0005
  maintenance_margin_rate: 0.005
  max_margin_alloc_pct: 0.20
  # OWNER OVERRIDE (2026-07-08): lowered 1.0 -> 0.8 so setups trade despite the
  # honest calibration's negative skew (avg win 0.886R < avg loss 1.039R => R:R
  # 0.85). These setups are positive-EV per calibration but that calibration does
  # NOT hold out-of-sample (model AUC 0.479) — trading the accepted negative edge.
  min_reward_risk: 0.8
  atr_stop_mult: 1.5
  max_stop_atr_mult: 3.0    # stop distance hard cap (ATR multiples)
  tp_r_multiples: [1.0, 2.0, 3.0]
  tp_allocations: [0.4, 0.35, 0.25]
  # ---- portfolio-level constraints ----
  max_concurrent_positions: 6
  max_total_margin_pct: 0.60
  correlation_cap: 0.8          # >this 30d return correlation = same bet
  max_portfolio_risk_pct: 0.06  # cap on TOTAL open risk-in-R across all positions
  # ---- circuit breakers ----
  max_daily_loss_pct: 0.03      # halt new entries after a -3% day
  max_consecutive_losses: 5
  # ---- fixed-margin sizing ("open each position with N USDT") ----
  # 0 = size by risk_per_trade_pct above. > 0 = commit exactly this many USDT of
  # MARGIN per trade (notional = fixed_margin_usdt * leverage). A new trade opens
  # whenever this much FREE USDT is available AND the portfolio caps above allow
  # it (one-per-symbol, max_concurrent_positions, correlation, total risk).
  fixed_margin_usdt: 15.0
  # ---- live edge safety catch ----
  # Refuse LIVE entries unless a positive out-of-sample edge is on record.
  # OWNER OVERRIDE (2026-07-08, risk explicitly accepted): set to false so live
  # entries are ALLOWED despite the measured-negative OOS edge (−0.071R, model
  # AUC 0.479). The other breakers below (daily-loss, losing-streak, portfolio
  # caps, free-margin, kill switch) remain ON. Set back to true to re-arm.
  require_validated_edge: false
  # ---- live execution quality (see BybitExecutor.open_position) ----
  # Reject an entry if step-truncating its qty to the exchange grid would change
  # the size by more than this fraction (protects sizing integrity).
  max_qty_truncation_pct: 0.10
  # Skip entries when the bid-ask spread exceeds this many basis points.
  max_spread_bps: 25.0
  # Entry orders are IOC limits priced ref*(1±cap) — a market order with bounded
  # slippage; an unfilled IOC is simply skipped (no chase).
  entry_slippage_cap_pct: 0.0015
  # Skip an entry whose side would PAY funding above this per-interval rate.
  max_entry_funding_rate: 0.0005
  # ---- live quality floor: "only take the best trades" (owner-approved) ----
  # A hard bar for LIVE entries so the bot never opens a marginal setup just
  # because margin is free. Paper + backtest still take everything.
  min_live_confidence: 0.65
  min_live_ev_r: 0.15
  # ---- live trade-selection filters (measured bleed-reducers; owner-approved) ----
  # These setups are never taken LIVE (paper + backtest still measure them so the
  # calibration keeps learning). Empirically the worst OOS segments.
  live_blocked_regimes: ["volatile"]
  live_blocked_setups: ["reversal"]
  # 80/20: cap 15m trades at ~20% of the concurrent book (1h/4h get the rest),
  # since 15m is the weakest timeframe but where most signals fire.
  live_tf_budget: {"15m": 0.2}
  # No re-entry into a symbol for this many bars (of its timeframe) after a
  # LOSING close — stops re-entry churn in the same chop.
  cooldown_bars_after_loss: 6
  cooldown_fallback_minutes: 120
  # ---- adaptive sizing ----
  adaptive_sizing_mode: none              # none | volatility_target | kelly
  volatility_target_atr_percentile: 50    # median ATR used as neutral anchor
  kelly_fraction: 0.25                    # quarter-Kelly cap
  # ---- time stop ----
  # 0 = inherit calibration.label_horizon_candles (so live/paper trades close on
  # the SAME horizon the backtest labels on). Set >0 here to override.
  max_trade_duration_candles: 0
  # ---- regime-dependent sizing ----
  volatile_regime_size_factor: 0.7

signals:
  # OWNER-APPROVED loosening (2026-07-08): thresholds lowered so the bot actually
  # finds and takes trades unsupervised in quiet markets. This surfaces MORE (and
  # lower-quality) setups — more trades on the measured-negative edge. Regime
  # gating stays ON as a floor. Raise these back up to trade more selectively.
  # Minimum overall confidence (0..1) to emit a trade plan.
  min_confidence: 0.55
  # Minimum number of agreeing evidence factors (raw pieces).
  min_confluence: 2
  # Minimum number of INDEPENDENT evidence families that must agree.
  min_families: 2
  # Hard-reject trades against the higher-timeframe trend (soft vote if false).
  htf_veto: false
  # Reject setup kinds that historically fail in the current regime.
  regime_gating: true
  # Signals expire after this many candles of the entry timeframe.
  validity_candles: 3

scanner:
  interval_sec: 300         # background scan cadence (seconds)
  concurrency: 8            # parallel OHLCV fetches (rate-limit friendly)
  cache_dir: data_cache     # incremental parquet candle cache
  enrich_top: 25            # only the top-ranked candidates get funding/OI calls
  top_n: 15                 # max published picks per scan (best trades only)

ml:
  enabled: true
  model_path: models/meta_model.pkl
  # Below this many backtest trades the meta-model stays out of the blend.
  min_training_trades: 300

streaming:
  # ccxt.pro WebSocket live ticks -> the dashboard updates prices/PnL between
  # scans. OFF by default; the REST feed remains the source of truth for signals.
  enabled: false

execution:
  mode: live                # paper | live  (live ALSO requires ALLOW_LIVE_TRADING=true in .env)
  testnet: false           # live orders go to Bybit TESTNET (fake money) by default...
  allow_mainnet: true      # ...unless testnet=false AND allow_mainnet=true (MAINNET = real money)

calibration:
  # Written by backtest.py. Maps setup name (optionally "|regime|tf") -> win rate.
  file: calibration.json
  # Recency decay half-life in CALENDAR days (recent trades weigh more). Applied
  # consistently across pooled symbols/timeframes.
  half_life_days: 45
  # With --walkforward, a factor is only written to the LIVE calibration if its
  # out-of-sample Wilson lower bound is at least this — drops factors that only
  # look good in-sample. (In-sample calibration is still saved as a diagnostic.)
  min_wilson_lower: 0.35
  # Bars a trade is simulated/held in the backtest = the ML label horizon. Also
  # applied as the live time-stop so backtest and live share ONE exit rule.
  label_horizon_candles: 48
